<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TweetExport Settings</title>
    <meta name="manifest.type" content="browser_action" />
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 m-0">
    <script>
      // Set background early to prevent flash of wrong color
      var bg = window.matchMedia('(prefers-color-scheme:dark)').matches
        ? '#111827'
        : '#f9fafb';
      document.body.style.background = bg;
    </script>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
